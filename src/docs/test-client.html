<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebSocket Test Client</title>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
      body {
        font-family: sans-serif;
        max-width: 800px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      .container {
        display: grid;
        gap: 1rem;
      }
      .card {
        border: 1px solid #ccc;
        padding: 1rem;
        border-radius: 8px;
      }
      .log {
        background: #f5f5f5;
        padding: 1rem;
        height: 300px;
        overflow-y: auto;
        border-radius: 4px;
        font-family: monospace;
      }
      .status {
        font-weight: bold;
      }
      .status.connected {
        color: green;
      }
      .status.disconnected {
        color: red;
      }
      button {
        cursor: pointer;
        padding: 0.5rem 1rem;
      }
      input {
        padding: 0.5rem;
        width: 200px;
      }
    </style>
  </head>
  <body>
    <h1>WebSocket Test Client</h1>

    <div class="container">
      <div class="card">
        <h3>Connection</h3>
        <div>
          Status:
          <span id="status" class="status disconnected">Disconnected</span>
        </div>
        <div style="margin-top: 1rem">
          <input type="text" id="token" placeholder="JWT Token (optional)" />
          <button onclick="connect()">Connect</button>
          <button onclick="disconnect()">Disconnect</button>
        </div>
      </div>

      <div class="card">
        <h3>Events</h3>
        <div style="display: grid; gap: 0.5rem">
          <div>
            <button onclick="emit('join-admin')">Emit 'join-admin'</button>
          </div>
          <div>
            <input type="text" id="chatId" placeholder="Chat ID" />
            <button onclick="joinChat()">Join Chat</button>
            <button onclick="leaveChat()">Leave Chat</button>
          </div>
        </div>
      </div>

      <div class="card">
        <h3>Logs</h3>
        <button
          onclick="clearLogs()"
          style="margin-bottom: 0.5rem; font-size: 0.8rem"
        >
          Clear
        </button>
        <div id="logs" class="log"></div>
      </div>
    </div>

    <script>
      let socket;

      function log(message, type = "info") {
        const logs = document.getElementById("logs");
        const entry = document.createElement("div");
        entry.style.color =
          type === "error" ? "red" : type === "success" ? "green" : "black";
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        logs.prepend(entry);
      }

      function clearLogs() {
        document.getElementById("logs").innerHTML = "";
      }

      function connect() {
        if (socket && socket.connected) return;

        const token = document.getElementById("token").value;
        const auth = token ? { token } : {};

        socket = io("http://localhost:3000", {
          auth,
          transports: ["websocket"],
        });

        socket.on("connect", () => {
          document.getElementById("status").textContent = "Connected";
          document.getElementById("status").className = "status connected";
          log("Connected to server", "success");
        });

        socket.on("disconnect", () => {
          document.getElementById("status").textContent = "Disconnected";
          document.getElementById("status").className = "status disconnected";
          log("Disconnected from server", "error");
        });

        socket.on("error", (err) => {
          log(`Error: ${JSON.stringify(err)}`, "error");
        });

        socket.on("connect_error", (err) => {
          log(`Connection Error: ${err.message}`, "error");
        });

        socket.on("user-admin:new-message", (data) => {
          log(`📨 New Message: ${data.senderName}: ${data.content}`, "success");
        });

        socket.on("user-admin:chat-updated", (data) => {
          log(
            `💬 Chat Updated: ${data.userName} - ${data.lastMessage}`,
            "info"
          );
        });
      }

      function disconnect() {
        if (socket) {
          socket.disconnect();
          socket = null;
        }
      }

      function emit(event, data) {
        if (!socket || !socket.connected) {
          log("Not connected!", "error");
          return;
        }
        socket.emit(event, data);
        log(`Emitted '${event}' ${data ? JSON.stringify(data) : ""}`);
      }

      function joinChat() {
        const chatId = document.getElementById("chatId").value;
        if (!chatId) return log("Chat ID required", "error");
        emit("user-admin:join", chatId);
      }

      function leaveChat() {
        const chatId = document.getElementById("chatId").value;
        if (!chatId) return log("Chat ID required", "error");
        emit("user-admin:leave", chatId);
      }
    </script>
  </body>
</html>
